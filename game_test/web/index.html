<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏测试工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222638;
    --border: #2e3350;
    --accent: #5b7cf6;
    --accent2: #7c5bf6;
    --green: #3ecf8e;
    --red: #f66b5b;
    --yellow: #f6c05b;
    --text: #e2e4f0;
    --text2: #8b90a8;
    --radius: 8px;
    --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; }

  /* ---- 顶栏 ---- */
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
  #status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  #status-dot.connected { background: var(--green); }
  #status-dot.stale { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #status-text { color: var(--text2); font-size: 12px; }
  #role-badge {
    margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 12px; font-size: 12px; color: var(--text);
  }
  #btn-disconnect {
    margin-left: 8px; padding: 4px 12px; border-radius: 6px;
    background: transparent; border: 1px solid var(--red); color: var(--red);
    cursor: pointer; font-size: 12px; display: none;
  }
  #btn-disconnect:hover { background: var(--red); color: #fff; }
  #reconnect-info { font-size: 11px; color: var(--yellow); }
  #auto-reconnect-wrap {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text2); cursor: pointer; user-select: none;
  }
  #auto-reconnect-wrap input { cursor: pointer; }

  /* ---- 主布局 ---- */
  #layout { display: grid; grid-template-columns: 320px 1fr; gap: 12px; padding: 12px; min-height: calc(100vh - 45px); }

  /* ---- 面板通用 ---- */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column;
  }
  .panel-title {
    padding: 8px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title span.badge {
    background: var(--accent); color: #fff; border-radius: 10px;
    padding: 0 7px; font-size: 11px; font-weight: 700; margin-left: auto;
  }
  .panel-body { padding: 12px; flex: 1; overflow-y: auto; }

  /* ---- Tab 导航 ---- */
  #tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .tab-btn {
    padding: 8px 16px; background: none; border: none; color: var(--text2);
    cursor: pointer; font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* ---- 表单 ---- */
  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; color: var(--text2); font-size: 11px; margin-bottom: 4px; }
  input[type=text], input[type=password], select, textarea {
    width: 100%; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; font-family: var(--font);
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  /* ---- 按钮 ---- */
  .btn {
    padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; font-family: var(--font); font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }
  .btn-success { background: var(--green); color: #000; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-warn { background: var(--yellow); color: #000; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-full { width: 100%; }

  /* ---- 提示/消息 ---- */
  .msg { padding: 7px 10px; border-radius: 6px; font-size: 12px; margin-top: 6px; }
  .msg-ok { background: #1a3a2a; color: var(--green); border: 1px solid #2a5a3a; }
  .msg-err { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
  .msg-info { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

  /* ---- 角色卡片 ---- */
  .role-card {
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: center; gap: 10px;
  }
  .role-card:hover { border-color: var(--accent); background: var(--surface2); }
  .role-card.selected { border-color: var(--accent); background: #1a2048; }
  .role-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent2); display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .role-name { font-weight: 600; font-size: 13px; }
  .role-job { color: var(--text2); font-size: 11px; margin-top: 2px; }

  /* ---- 背包 ---- */
  #backpack-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px;
  }
  .item-card {
    border: 1px solid var(--border); border-radius: 6px; padding: 8px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-card.selected { border-color: var(--accent); background: #1a2048; }
  .item-card.can-decompose { border-left: 3px solid var(--yellow); }
  .item-name { font-size: 12px; font-weight: 500; word-break: break-all; }
  .item-qty { color: var(--text2); font-size: 11px; margin-top: 3px; }
  .item-id { color: #444; font-size: 10px; font-family: monospace; margin-top: 2px; }
  #backpack-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

  /* ---- 聊天 ---- */
  #chat-log {
    flex: 1; overflow-y: auto; padding: 8px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; min-height: 200px;
    font-size: 12px; line-height: 1.6;
  }
  .chat-msg-world { color: #ff8080; }
  .chat-msg-system { color: #80b4ff; }
  .chat-msg-self { color: var(--green); }
  .chat-msg-system-announce { color: var(--yellow); }
  #chat-input-row { display: flex; gap: 8px; margin-top: 8px; }
  #chat-input { flex: 1; }

  /* ---- 报文探测面板 ---- */
  #probe-panel { display: flex; flex-direction: column; gap: 8px; height: 100%; }
  #probe-filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #probe-filters label { color: var(--text2); font-size: 11px; }
  #probe-filters select, #probe-filters input { width: auto; padding: 4px 8px; font-size: 12px; }
  #packet-list { flex: 1; overflow-y: auto; min-height: 0; }
  .packet-row {
    border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px;
    overflow: hidden; transition: border-color 0.15s;
  }
  .packet-row:hover { border-color: var(--accent); }
  .packet-header {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--surface2); cursor: pointer; user-select: none;
  }
  .dir-badge {
    padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .dir-UP { background: #1a3a5a; color: #5bbeff; }
  .dir-DN { background: #1a3a2a; color: var(--green); }
  .pkt-time { color: var(--text2); font-size: 11px; flex-shrink: 0; }
  .pkt-fp { font-family: monospace; font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .pkt-type { font-size: 11px; color: var(--accent); flex-shrink: 0; }
  .pkt-annotation { font-size: 11px; color: var(--yellow); }
  .parse-badge { margin-left: auto; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .parse-badge.known { background: #1a3a2a; color: var(--green); }
  .parse-badge.generic { background: #1a2a3a; color: #5bbeff; }
  .parse-badge.unknown { background: #3a1a1a; color: var(--red); }
  .pkt-raw-hex-wrapper { position: relative; margin-bottom: 8px; }
  .pkt-copy-btn {
    position: absolute; top: 4px; right: 4px;
    padding: 2px 8px; font-size: 10px; border-radius: 4px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text2);
    cursor: pointer; opacity: 0.7; transition: all 0.15s;
  }
  .pkt-copy-btn:hover { opacity: 1; color: var(--accent); border-color: var(--accent); }
  .pkt-detail {
    display: none; padding: 10px; border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .pkt-detail.open { display: block; }
  .pkt-raw-hex {
    font-family: monospace; font-size: 11px; color: var(--text2);
    word-break: break-all; background: var(--surface2);
    padding: 6px 42px 6px 6px; border-radius: 4px;
    max-height: 100px; overflow-y: auto;
  }
  .pkt-utf8 {
    font-size: 12px; color: var(--text); background: var(--surface2);
    padding: 6px; border-radius: 4px; margin-bottom: 8px;
    word-break: break-word; max-height: 80px; overflow-y: auto;
  }
  .pkt-utf8 .cn-text { color: #ffd77a; }
  .pkt-fields { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .pkt-fields span { color: var(--text); }
  .annotation-row { display: flex; gap: 6px; margin-top: 6px; }
  .annotation-row input { flex: 1; padding: 4px 8px; font-size: 12px; }
  .annotation-row button { padding: 4px 10px; font-size: 12px; }

  /* ---- 自定义发包 ---- */
  #custom-send-panel {
    border: 1px solid var(--border); border-radius: 6px; padding: 10px;
    background: var(--surface2);
  }
  #custom-send-panel h3 { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  #custom-hex { font-family: monospace; font-size: 12px; }
  #custom-send-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  #custom-send-result { font-size: 12px; margin-top: 6px; }

  /* ---- 公告 ---- */
  #announcement-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; font-size: 12px; color: var(--text2); max-height: 120px; overflow-y: auto;
    white-space: pre-wrap; line-height: 1.7;
  }

  /* ---- 服务器列表 ---- */
  .server-item {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .server-item:hover { border-color: var(--accent); background: var(--surface2); }
  .server-item.selected { border-color: var(--accent); background: #1a2048; }
  .server-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .server-name { font-weight: 500; }
  .server-addr { color: var(--text2); font-size: 11px; margin-left: auto; }

  /* ---- 滚动条 ---- */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ---- 角色属性面板 ---- */
  #role-stats-panel { display: none; }
  #role-stats-panel.visible { display: block; }
  .stats-group { margin-bottom: 10px; }
  .stats-group-title {
    font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 5px; border-bottom: 1px solid var(--border);
    padding-bottom: 3px;
  }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 3px 6px;
  }
  .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
  .stat-name { color: var(--text2); }
  .stat-value { color: var(--text); font-weight: 500; font-family: monospace; font-size: 11px; }
  .stat-value.highlight { color: var(--accent); }

  /* ---- 折叠徽章 ---- */
  .pkt-collapse-count {
    font-size: 10px; background: var(--accent2); color: #fff;
    border-radius: 10px; padding: 1px 7px; font-weight: 700; flex-shrink: 0;
  }
  #btn-collapse-mode {
    padding: 4px 10px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  #btn-collapse-mode.active { border-color: var(--accent2); color: var(--accent2); background: #1a1030; }

  /* ---- 工具类 ---- */
  .flex-row { display: flex; gap: 8px; align-items: center; }
  .mt-8 { margin-top: 8px; }
  .text-sm { font-size: 11px; }
  .text-muted { color: var(--text2); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .hidden { display: none !important; }
  .separator { height: 1px; background: var(--border); margin: 10px 0; }
  .mono { font-family: monospace; }
  .battle-box { border: 1px solid var(--border); border-radius: 6px; padding: 10px; background: var(--surface2); margin-bottom: 10px; }
  .battle-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .battle-log { min-height: 220px; max-height: 420px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); padding: 8px; }
  .battle-log-item { font-size: 12px; margin-bottom: 6px; color: var(--text2); white-space: pre-wrap; word-break: break-word; }
  .battle-log-item.end { color: var(--yellow); }
  .monster-row { display: grid; grid-template-columns: 1fr 80px 130px; gap: 8px; align-items: center; margin-bottom: 6px; }
  .monster-row.selected { background: #1a2048; border-radius: 6px; padding: 4px; }
  .monster-code { font-family: monospace; color: var(--text2); }
  .battle-dropdown { border: 1px solid var(--border); border-radius: 6px; background: rgba(0,0,0,0.08); }
  .battle-dropdown + .battle-dropdown { margin-top: 8px; }
  .battle-dropdown > summary {
    list-style: none;
    cursor: pointer;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .battle-dropdown > summary::-webkit-details-marker { display: none; }
  .battle-dropdown > summary::after { content: '展开'; color: var(--text2); font-size: 11px; }
  .battle-dropdown[open] > summary::after { content: '收起'; }
  .battle-dropdown-body { padding: 0 10px 10px; }
  .battle-manage-grid { display: grid; grid-template-columns: minmax(180px, 260px) 1fr auto; gap: 8px; align-items: center; }

  @media (max-width: 900px) {
    #layout { grid-template-columns: 1fr; }
    .battle-manage-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ====== 顶栏 ====== -->
<div id="topbar">
  <h1>⚔ 游戏测试工具</h1>
  <div id="status-dot"></div>
  <span id="status-text">未连接</span>
  <span id="reconnect-info"></span>
  <span id="role-badge">—</span>
  <label id="auto-reconnect-wrap" title="断线后自动重新登录并选角">
    <input type="checkbox" id="chk-auto-reconnect"> 自动重连
  </label>
  <button id="btn-disconnect" onclick="disconnect()">断开</button>
</div>

<!-- ====== 主布局 ====== -->
<div id="layout">

  <!-- ====== 左侧面板 ====== -->
  <div style="display:flex; flex-direction:column; gap:12px;">

    <!-- 登录面板 -->
    <div class="panel" id="login-panel">
      <div class="panel-title">🔐 登录</div>
      <div class="panel-body">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="inp-account" placeholder="游戏账号（ASCII）">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="inp-password" placeholder="游戏密码（ASCII）">
        </div>
        <div class="form-group">
          <label>登录服务器</label>
          <select id="sel-login-server">
            <option value="龙一服">龙一服</option>
            <option value="龙二服">龙二服</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full" id="btn-login" onclick="doLogin()">登录</button>
        <div id="login-msg"></div>
      </div>
    </div>

    <!-- 一键登录 -->
    <div class="panel" id="quick-login-panel">
      <div class="panel-title">⚡ 一键登录</div>
      <div class="panel-body">
        <div id="quick-login-list" class="text-muted text-sm">暂无已保存登录</div>
        <button class="btn btn-ghost btn-sm mt-8" onclick="loadQuickLogins()">刷新</button>
      </div>
    </div>

    <!-- 公告 + 游戏服选择 -->
    <div class="panel" id="server-panel" style="display:none">
      <div class="panel-title">📢 公告 & 服务器选择</div>
      <div class="panel-body">
        <div id="announcement-box" class="text-muted">暂无公告</div>
        <div class="separator"></div>
        <div style="font-size:11px; color:var(--text2); margin-bottom:8px;">选择游戏服务器：</div>
        <div id="server-list"></div>
        <button class="btn btn-primary btn-full mt-8" id="btn-fetch-roles" onclick="fetchRoles()" disabled>获取角色列表</button>
        <div id="server-msg"></div>
      </div>
    </div>

    <!-- 角色选择 -->
    <div class="panel" id="role-panel" style="display:none">
      <div class="panel-title">👤 角色选择</div>
      <div class="panel-body">
        <div id="role-list"></div>
        <button class="btn btn-success btn-full mt-8" id="btn-enter" onclick="enterGame()" disabled>进入游戏</button>
        <div id="role-msg"></div>
      </div>
    </div>

    <!-- 角色属性面板（进游戏后显示） -->
    <div class="panel" id="role-stats-panel">
      <div class="panel-title" style="cursor:pointer; user-select:none;" onclick="toggleStatsPanel()">
        📊 角色属性
        <span id="stats-toggle-icon" style="float:right; font-size:11px; color:var(--text2);">▼</span>
      </div>
      <div class="panel-body" id="stats-body">
        <div id="stats-content" style="font-size:12px; color:var(--text2);">等待数据...</div>
      </div>
    </div>

  </div>

  <!-- ====== 右侧面板（Tab） ====== -->
  <div class="panel" style="min-height:500px;">
    <div id="tabs">
      <button class="tab-btn active" onclick="switchTab('probe')">🔍 报文探测</button>
      <button class="tab-btn" onclick="switchTab('backpack')">🎒 背包</button>
      <button class="tab-btn" onclick="switchTab('chat')">💬 聊天</button>
      <button class="tab-btn" onclick="switchTab('battle')">⚔ 战斗</button>
    </div>

    <!-- 背包 Tab -->
    <div class="tab-content panel-body" id="tab-backpack">
      <div id="backpack-actions">
        <button class="btn btn-success btn-sm" onclick="useSelected()">使用</button>
        <button class="btn btn-danger btn-sm" onclick="dropSelected()">丢弃</button>
        <button class="btn btn-warn btn-sm" onclick="decomposeSelected()">分解</button>
        <button class="btn btn-ghost btn-sm" onclick="decomposeAll()">一键分解</button>
        <button class="btn btn-ghost btn-sm" onclick="exchangeWuling()">兑换五灵</button>
        <button class="btn btn-ghost btn-sm" onclick="refreshBackpack()">刷新</button>
        <span class="text-muted text-sm" id="backpack-count"></span>
      </div>
      <div id="backpack-grid"><div class="text-muted text-sm">背包为空或尚未进入游戏</div></div>
      <div id="backpack-msg" class="mt-8"></div>
    </div>

    <!-- 聊天 Tab -->
    <div class="tab-content panel-body" id="tab-chat" style="flex-direction:column; gap:8px;">
      <div id="chat-log"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="输入消息（回车发送）" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-primary" onclick="sendChat()">发送</button>
      </div>
    </div>

    <!-- 战斗 Tab -->
    <div class="tab-content panel-body" id="tab-battle" style="flex-direction:column; gap:8px;">
      <div class="battle-box">
        <div style="font-size:12px; color:var(--text2); margin-bottom:8px;">战斗控制</div>
        <div class="battle-row">
          <span class="text-muted">当前怪物：</span>
          <select id="battle-monster-select" onchange="selectMonster(this.value)" style="width:auto; min-width:180px; max-width:260px; padding:4px 8px; font-size:12px;">
            <option value="">暂无怪物</option>
          </select>
          <span id="battle-current-monster">未选择</span>
          <span class="text-muted">启动延时(ms)：</span>
          <input type="text" id="battle-loop-delay" value="1900" style="width:90px; padding:4px 8px; font-size:12px;">
          <button id="btn-battle-loop" class="btn btn-success btn-sm" onclick="toggleBattleLoop()">开始循环战斗</button>
          <button class="btn btn-ghost btn-sm" onclick="triggerBattleOnce(true)">手动单次</button>
          <span class="text-muted" id="battle-stats">次数: 0 / 经验: - / 金币: -</span>
        </div>

        <details class="battle-dropdown mt-8">
          <summary>怪物管理</summary>
          <div class="battle-dropdown-body">
            <div class="battle-manage-grid">
              <select id="battle-monster-manage-select" onchange="selectMonster(this.value)" style="width:100%; padding:4px 8px; font-size:12px;">
                <option value="">请选择怪物</option>
              </select>
              <div class="text-muted text-sm">下拉选择当前目标，新增/更新后会自动同步到战斗控制。</div>
              <button class="btn btn-danger btn-sm" onclick="deleteSelectedMonster()">删除当前</button>
            </div>
            <div class="battle-row mt-8">
              <input type="text" id="battle-monster-name" placeholder="怪物名称" style="max-width:220px;">
              <input type="text" id="battle-monster-code" placeholder="怪物代码(4位hex)" style="max-width:180px;">
              <button class="btn btn-primary btn-sm" onclick="addMonster()">新增/更新</button>
            </div>
          </div>
        </details>

        <details class="battle-dropdown mt-8">
          <summary>自动使用物品（后端执行）</summary>
          <div class="battle-dropdown-body">
            <div id="auto-use-list" class="text-muted text-sm">加载中...</div>
            <div class="battle-row mt-8">
              <button class="btn btn-primary btn-sm" onclick="saveAutoUseRules()">保存配置</button>
              <button class="btn btn-ghost btn-sm" onclick="loadAutoUseRules()">刷新</button>
            </div>
          </div>
        </details>
      </div>

      <div class="battle-box" style="flex:1; display:flex; flex-direction:column;">
        <div class="battle-row" style="justify-content:space-between; margin-bottom:8px;">
          <span style="font-size:12px; color:var(--text2);">战斗过程</span>
          <div class="battle-row">
            <label class="text-muted" style="font-size:12px;">
              输出模式：
              <select id="battle-log-mode" onchange="onBattleLogModeChange()" style="width:auto; padding:3px 6px; font-size:12px;">
                <option value="simple" selected>精简</option>
                <option value="detail">详细</option>
              </select>
            </label>
            <button class="btn btn-ghost btn-sm" onclick="clearBattleLog()">清空</button>
          </div>
        </div>
        <div id="battle-log" class="battle-log"></div>
      </div>
    </div>

    <!-- 报文探测 Tab -->
    <div class="tab-content active panel-body" id="tab-probe" style="flex-direction:column; gap:8px; padding:10px;">
      <div id="probe-panel">

        <!-- 自定义发包 -->
        <div id="custom-send-panel">
          <h3>⬆ 自定义发包（探索新功能）</h3>
          <textarea id="custom-hex" rows="3" placeholder="输入 hex 字符串，如：1e000000e80308000404..."></textarea>
          <div id="custom-send-row">
            <label style="color:var(--text2); font-size:12px;">
              <input type="checkbox" id="chk-use-queue" checked> 走发送队列（节流 0.6s）
            </label>
            <button class="btn btn-primary btn-sm" onclick="sendProbePacket()">发送</button>
            <button class="btn btn-ghost btn-sm" onclick="parseProbeHex()">仅解析</button>
          </div>
          <div id="custom-send-result"></div>
        </div>

        <!-- 过滤栏 -->
        <div id="probe-filters" style="flex-direction:column; align-items:stretch; gap:6px;">
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <label>方向</label>
            <select id="flt-dir" onchange="filterPackets()">
              <option value="">全部</option>
              <option value="UP">上行↑</option>
              <option value="DN">下行↓</option>
            </select>
            <label>解析</label>
            <select id="flt-parsed" onchange="filterPackets()">
              <option value="">全部</option>
              <option value="true">已解析</option>
              <option value="false">未解析</option>
            </select>
            <label>指纹</label>
            <select id="flt-annotated" onchange="filterPackets()">
              <option value="">全部</option>
              <option value="true">已有描述</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="loadPackets()">刷新</button>
            <button class="btn btn-ghost btn-sm" onclick="clearPacketList()">清空显示</button>
            <button id="btn-collapse-mode" onclick="toggleCollapseMode()" title="折叠相同指纹的报文，只显示最新一条及出现次数">折叠同类</button>
            <span class="text-muted text-sm" id="pkt-count"></span>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <label style="flex-shrink:0;">搜索</label>
            <input type="text" id="flt-search" placeholder="搜索 hex / 指纹描述 / UTF-8 内容…"
              style="flex:1; padding:4px 8px; font-size:12px;" oninput="filterPackets()">
            <label style="flex-shrink:0;">排除指纹</label>
            <input type="text" id="flt-exclude-fp" placeholder="如：514f, ec07（逗号分隔）"
              style="flex:1; padding:4px 8px; font-size:12px;" oninput="filterPackets()">
          </div>
        </div>

        <!-- 报文列表 -->
        <div id="packet-list" style="flex:1; overflow-y:auto; min-height:200px;"></div>

      </div>
    </div>

  </div>
</div>

<script src="/state.js"></script>
<script src="/api-client.js"></script>
<script src="/events.js"></script>
<script src="/render.js"></script>
<script src="/controllers.js"></script>
<script src="/app.js"></script>
</body>
</html>
